<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>
  </head>

  <body>
    <header>
      <h1>{{ site.title }}</h1>
      {% if site.description %}<p>{{ site.description }}</p>{% endif %}
    </header>

    <main>
      {{ content }}
    </main>

    <footer>
      <p>{{ site.footer.copyright }}</p>
      <p>{{ site.footer.text }}</p>
    </footer>
  </body>
</html>
